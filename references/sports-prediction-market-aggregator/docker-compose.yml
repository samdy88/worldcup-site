version: '3.9'

services:
  bot:
    image: node:20-alpine
    working_dir: /app/bot
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - '3001:3001'
    command: sh -c "npm install && npm run dev"

  dashboard:
    image: node:20-alpine
    working_dir: /app/dashboard
    volumes:
      - .:/app
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  dashboard-public:
    image: node:20-alpine
    working_dir: /app/dashboard
    volumes:
      - .:/app
    ports:
      - '5174:5174'
    environment:
      - VITE_PUBLIC_MODE=true
    command: sh -c "npm install && npm run dev:public -- --host 0.0.0.0"
