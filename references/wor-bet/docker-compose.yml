services:
  app:
    build: .
    ports:
      - "3100:3000"
    volumes:
      - ./data:/app/data
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - SESSION_SECRET=${SESSION_SECRET:-worldcup-bet-secret-2026}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/matches"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 每分钟更新赔率
  odds-cron:
    image: curlimages/curl:latest
    depends_on:
      - app
    entrypoint: >
      /bin/sh -c "
        while true; do
          curl -sf http://app:3000/api/cron/update-odds > /dev/null 2>&1 || true;
          sleep 60;
        done
      "
    restart: unless-stopped
