<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頁面不存在 - 2026 世界杯即时比分网</title>
    <style>
        :root {
            --primary-color: #8a1538; /* 世界盃經典卡達紅 */
            --accent-color: #eebe6c;  /* 奢華金 */
            --bg-color: #f7f9fc;
            --text-color: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid var(--primary-color);
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
        }
        .error-icon {
            font-size: 40px;
            margin: 10px 0;
        }
        h2 {
            margin-top: 10px;
            font-size: 22px;
            color: #222;
        }
        p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(138, 21, 56, 0.2);
        }
        .btn:hover {
            background-color: #6b102b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-icon">⚽ 🛑</div>
        <h2>糟糕！此球場查無此賽事</h2>
        <p>
            您訪問的網頁可能已經移防、被判越位（刪除），<br>
            或是輸入了錯誤的網址戰術。
        </p>
        <!-- 點擊會自動返回首頁 -->
        <a href="/" class="btn">返回即时比分首页</a>
    </div>

</body>
</html>
