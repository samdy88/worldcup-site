<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">

      <nav class="side-nav">
        <a class="active" href="#home" data-route="home">🏟️ 首页大厅</a>
        <a href="#schedule" data-route="schedule">📅 赛程比分</a>
        <a href="#teams" data-route="teams">🛡️ 球队</a>
        <a href="#standings" data-route="standings">🏆 排行榜</a>
        <a href="#odds" data-route="odds">📈 实时赔率</a>
        <a href="#predictions" data-route="predictions">🤖 预测</a>
        <a href="#pool" data-route="pool">💰 投注池</a>
        <a href="#my-bets" data-route="my-bets">🎫 我的投注</a>
      </nav>

    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <p class="eyebrow mb-1">2026 FIFA WORLD CUP · USA / MEXICO / CANADA</p>

        </div>
        <form id="search-form" class="search-box" role="search">
          <span>⌕</span>
          <input id="site-search" type="search" placeholder="搜索球队、比赛、场馆、日期" autocomplete="off" />
        </form>

            <label for="match-select" class="form-label small text-secondary">比赛</label>
            <select id="match-select" class="form-select form-select-sm mb-3"></select>
            <div id="selected-match-card" class="selected-match mb-3"></div>
            <div id="odds-panel" class="odds-grid mb-3"></div>

          </aside>
        </div>
      </section>


</body>
</html>
