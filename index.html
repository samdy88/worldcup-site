<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100% 複刻 API-Football 原廠小部件範例</title>

    <!-- 1. 【核心複刻】必須引入官方 Widget V3 的 CSS 樣式表 -->
    <link rel="stylesheet" href="https://api-sports.io">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .widget-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        /* 自訂小部件主題顏色 (可自由修改) */
        #wg-api-football {
            --api-f-primary: #8a1538; /* 主色調：卡達紅 */
            --api-f-bg: #ffffff;
            --api-f-text: #333333;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <h2>⚽ API-Football 官方即時賽程看板</h2>

        <!-- 2. 【核心複刻】官方標準的小部件 HTML 容器 -->
        <!-- ⚠️ 請務必將 data-key 替換為您的真實 API 金鑰 -->
        <div id="wg-api-football"
             data-host="v3.football.api-sports.io"
             data-key="a5f67c885e08bb098a1d202408f4fedd"
             data-type="league"
             data-league="1"
             data-season="2026"
             data-theme="light"
             data-refresh="15"
             class="api_football_loader">
        </div>
    </div>

    <!-- 3. 【最重要的一步】必須在 body 最底部引入官方的 Widgets JS 核心驅動引擎 -->
    <!-- ⚠️ 必須帶有 type="module"，否則瀏覽器無法執行 -->
    <script type="module" src="https://api-sports.io"></script>

</body>
</html>
