<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方樣式 & V3 數據引擎整合面板</title>
    <!-- 官方指定樣式庫：使用 Tailwind CSS 建立現代化 UI -->
    <script src="https://tailwindcss.com"></script>
    <style>
        /* 官方專屬自訂樣式微調 */
        .v3-gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
        }
        .data-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- 導覽列 (Official Style Header) -->
    <header class="v3-gradient-bg border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-white">V3</div>
                <span class="text-lg font-semibold tracking-wider">數據整合管理系統</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="flex items-center text-sm text-green-400 bg-green-900/30 px-3 py-1 rounded-full border border-green-500/30">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 data-pulse"></span>
                    V3 引擎已連線
                </span>
            </div>
        </div>
    </header>

    <!-- 主體內容區 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 狀態數據卡片區 (Metrics Overview) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- 卡片 1 -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 font-medium uppercase">引擎處理速率 (TPS)</p>
                <p id="metric-tps" class="text-3xl font-bold text-blue-400 mt-2">--</p>
                <div class="text-xs text-gray-500 mt-2">即時同步於 V3 核心</div>
            </div>
            <!-- 卡片 2 -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 font-medium uppercase">本日累計數據量</p>
                <p id="metric-total" class="text-3xl font-bold text-purple-400 mt-2">--</p>
                <div class="text-xs text-gray-500 mt-2">較昨日同時段增長 <span class="text-green-400">+12.3%</span></div>
            </div>
            <!-- 卡片 3 -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-sm text-gray-400 font-medium uppercase">系統響應延遲</p>
                <p id="metric-latency" class="text-3xl font-bold text-emerald-400 mt-2">-- ms</p>
                <div class="text-xs text-gray-500 mt-2">節點狀態：極佳</div>
            </div>
        </div>

        <!-- 數據日誌與控制台 (V3 Data Engine Monitor) -->
        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between bg-gray-800/50">
                <h2 class="text-lg font-medium text-gray-200">V3 引擎即時數據串流日誌</h2>
                <button onclick="V3_ENGINE.resetStream()" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded transition">
                    清除日誌
                </button>
            </div>
            <div class="p-6">
                <!-- 模擬串流日誌輸出 -->
                <div id="v3-log-console" class="bg-gray-950 rounded-lg p-4 font-mono text-sm text-green-400 h-64 overflow-y-auto border border-gray-800 space-y-1">
                    <div class="text-gray-500">[系統初始化] 正在載入官方樣式特徵碼...</div>
                    <div class="text-gray-500">[系統初始化] 正在引導 V3 數據引擎對接模組...</div>
                </div>
            </div>
        </div>

    </main>

    <!-- V3 數據引擎核心對接 JavaScript -->
    <script>
        // V3 數據引擎封裝物件
        const V3_ENGINE = {
            // 請在此處配置您的實際 V3 引擎 API 端點
            apiEndpoint: "https://official-v3-engine.local", 
            timer: null,
            totalDataCount: 125400,

            // 初始化引擎
            init() {
                this.log("系統", "成功合併官方樣式與 V3 數據引擎組件。");
                this.startMockStream(); // 實際專案中請替換為真實的 Fetch 或 WebSocket 監聽
            },

            // 啟動數據監聽
            startMockStream() {
                this.log("引擎", "開始接收 V3 即時數據流...");
                
                this.timer = setInterval(() => {
                    // 模擬 V3 數據引擎產生的即時數據
                    const mockTps = Math.floor(Math.random() * (450 - 380 + 1)) + 380;
                    const mockLatency = Math.floor(Math.random() * (45 - 12 + 1)) + 12;
                    this.totalDataCount += Math.floor(Math.random() * 5);

                    // 渲染至 UI 畫面
                    document.getElementById('metric-tps').innerText = mockTps.toLocaleString();
                    document.getElementById('metric-total').innerText = this.totalDataCount.toLocaleString();
                    document.getElementById('metric-latency').innerText = `${mockLatency} ms`;

                    // 輸出日誌
                    if (Math.random() > 0.4) {
                        this.log("數據更新", `成功處理區塊。當前 TPS: ${mockTps}, 延遲: ${mockLatency}ms`);
                    }
                }, 1500);
            },

            // 日誌輸出器
            log(type, message) {
                const consoleEl = document.getElementById('v3-log-console');
                const timestamp = new Date().toLocaleTimeString();
                const logItem = document.createElement('div');
                
                logItem.innerHTML = `<span class="text-blue-400">[${timestamp}]</span> <span class="text-yellow-500">[${type}]</span> ${message}`;
                consoleEl.appendChild(logItem);
                
                // 自動捲動到最下方
                consoleEl.scrollTop = consoleEl.scrollHeight;
            },

            // 清除日誌
            resetStream() {
                document.getElementById('v3-log-console').innerHTML = `<div class="text-gray-500">[系統] 日誌已被使用者清除。</div>`;
            }
        };

        // 當 DOM 載入完成後啟動引擎
        document.addEventListener('DOMContentLoaded', () => {
            V3_ENGINE.init();
        });
    </script>
</body>
</html>
