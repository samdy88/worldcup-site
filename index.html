<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 FIFA-Dream Football</title>
  <script src="https://jsdelivr.net"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <link href="https://jsdelivr.net" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous" />
  <script type="module" crossorigin src="https://api-sports.io"></script>
  
  <style>
    /* 直接在此補齊核心佈局，防止框架高度塌陷與數據擠壓 */
    body { background-color: #0f172a !important; }
    .header { background-color: #1e1b4b !important; border-bottom: 2px solid #eebe6c; }
    .navbar-brand { font-weight: 900; color: #eebe6c !important; }
    .card { background-color: #1e293b !important; border: 1px solid #334155 !important; margin-bottom: 15px; min-height: 100px; }
    api-sports-widget { display: block; width: 100%; min-height: 200px; max-height: 70vh; overflow-y: auto; }
    .btn-maroon { background-color: #8a1538 !important; color: white !important; }
    .btn-gold { background-color: #eebe6c !important; color: #111 !important; font-weight: bold; }
  </style>
</head>

<body>
  <nav class="header navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">WIN！</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" data-sport="football" href="#">Football</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="baseball" href="#">Baseball</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="basketball" href="#">Basketball</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="handball" href="#">Handball</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="hockey" href="#">Hockey</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="rugby" href="#">Rugby</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="volleyball" href="#">Volleyball</a></li>
        </ul>
        <!-- 導覽列右側動態積分看版 -->
        <span class="navbar-text text-warning font-monospace fs-5 me-3">
          PTS: <span id="user-points" class="fw-bold text-white">0</span>
        </span>
      </div>
    </div>
  </nav>

  <div class="content p-3">
    <div class="row">

      <!-- 左側欄位 -->
      <div class="col-3">
        <div id="leagues-list" class="card text-bg-dark border-dark">
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>

        <!-- 卡密儲值模組 -->
        <div class="card text-bg-dark border-dark p-3">
          <h6 class="text-warning">🔑 CARD RECHARGE</h6>
          <div class="input-group input-group-sm">
            <input type="text" id="card-code" class="form-control bg-dark text-white border-secondary" placeholder="Card Password">
            <button class="btn btn-gold" onclick="redeemCard()">REDEEM</button>
          </div>
        </div>
      </div>

      <!-- 中間欄位 -->
      <div class="col-5">
        <div id="games-list" class="card text-bg-dark border-dark">
          <div class="card-body p-0">
            <div id="games-list">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>
      </div>

      <!-- 右側欄位 -->
      <div class="col-4">

        <!-- 積分投注操控模組 -->
        <div class="card text-bg-dark border-dark p-3">
          <h6 class="text-info">🔥 BETTING PREDICTION (10 PTS/BET)</h6>
          <div class="d-flex justify-content-between">
            <button class="btn btn-sm btn-maroon w-100 me-1" onclick="placePointsBet('HOME WIN')">HOME</button>
            <button class="btn btn-sm btn-secondary w-100 me-1" onclick="placePointsBet('DRAW')">DRAW</button>
            <button class="btn btn-sm btn-primary w-100" onclick="placePointsBet('AWAY WIN')">AWAY</button>
          </div>
        </div>

        <!-- Start Dynamic Targeting containers -->
        <div class="card text-bg-dark border-dark">
          <div class="card-body p-0">
            <div id="standings-content"></div>
          </div>
        </div>
        <div class="card text-bg-dark border-dark">
          <div class="card-body p-0">
            <div id="team-content"></div>
          </div>
        </div>
        <!-- End Dynamic Targeting containers -->

        <!-- 賽事即時統計卡片：移除硬編碼的死 ID，由全域 Config 動態監聽注入 2026 世界盃賽事數據 -->
        <div id="game-content" class="card text-bg-dark border-dark">
          <div class="card-body p-0">
            <api-sports-widget data-type="game"></api-sports-widget>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Config widget -->
  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-league="1"
    data-season="2026"
    data-key="a5f67c885e08bb098a1d202408f4fedd" 
    data-lang="en"
    data-url-football="https://b-cdn.net"
    data-theme="grey" 
    data-show-error="false" 
    data-show-logos="true" 
    data-logo-url="https://api-sports.io"
    data-refresh="20" 
    data-favorite="true"
    data-player-trophies="true" 
    data-standings="true" 
    data-player-injuries="true" 
    data-team-squad="true"
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics"
    data-target-player="modal" 
    data-target-league="#games-list" 
    data-target-team="#team-content"
    data-target-game="#game-content .card-body" 
    data-target-standings="#standings-content"
  ></api-sports-widget>
</body>

<script>
  // 1. 積分讀取與初始化
  let currentPoints = parseInt(localStorage.getItem("user_points")) || 0;
  document.getElementById("user-points").innerText = currentPoints;

  // 2. 原生點擊切換運動項目邏輯
  document.addEventListener('click', function (event) {
    if (!event.target.matches('.nav-link')) return
    event.preventDefault()

    let sport = event.target.getAttribute('data-sport')

    let widget = document.querySelector('api-sports-widget[data-type="config"]');
            widget.setAttribute('data-sport', sport);

    let leagues = document.querySelector('api-sports-widget[data-type="leagues"]');
            leagues.innerHTML = ''
            leagues.setAttribute('data-sport', sport)
            leagues.connectedCallback()

    let games = document.querySelector('api-sports-widget[data-type="games"]');
            games.innerHTML = ''
            games.setAttribute('data-sport', sport)
            games.connectedCallback()

    let game = document.querySelector('api-sports-widget[data-type="game"]');
            if(game) {
               game.innerHTML = ''
               game.setAttribute('data-sport', sport)
               game.connectedCallback()
            }

    window.document.dispatchEvent(new Event("DOMContentLoaded", {
      bubbles: true,
      cancelable: true
    }));
  });

  // 3. Google 試算表卡密儲值功能
  async function redeemCard() {
      const codeInput = document.getElementById("card-code");
      const code = codeInput.value.trim();
      if(!code) { alert("Please enter card code!"); return; }
      
      // ⚠️ 請在此處填入您部署成功的 Google Apps Script 後端網址
      const gasUrl = "您的_GOOGLE_APPS_SCRIPT_URL"; 
      try {
          const response = await fetch(gasUrl, { method: "POST", body: JSON.stringify({ code: code }) });
          const result = await response.json();
          if(result.success) {
              currentPoints += parseInt(result.points);
              localStorage.setItem("user_points", currentPoints);
              document.getElementById("user-points").innerText = currentPoints;
              alert(result.message);
              codeInput.value = "";
          } else { alert(result.message); }
      } catch(e) { alert("Verification timeout. Please check your Google Apps Script URL."); }
  }

  // 4. 積分模擬投注功能
  function placePointsBet(prediction) {
      if(currentPoints < 10) {
          alert("Insufficient points! Please recharge first.");
          return;
      }
      currentPoints -= 10;
      localStorage.setItem("user_points", currentPoints);
      document.getElementById("user-points").innerText = currentPoints;
      alert("【SUCCESS】10 PTS deducted!\nPrediction: " + prediction);
  }
</script>

</html>
