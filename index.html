<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 世界盃官方聯動數據投注站</title>
  
  <!-- 引入 Bootstrap 5 官方樣式與腳本 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  
  <!-- 引入 API-Sports 官方最新版資料引擎與控制樣式 -->
  <link rel="stylesheet" href="https://api-sports.io">
  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

  <style>
    /* 補齊官方教學中缺少的 style.css 核心佈局樣式 */
    body {
      background-color: #0f172a !important; /* 深色科技背景 */
    }
    .header {
      background-color: #1e1b4b !important; /* 暗夜紫，襯托世界盃高級感 */
      border-bottom: 2px solid #eebe6c;
    }
    .navbar-brand {
      font-weight: 900;
      letter-spacing: 1px;
      color: #eebe6c !important;
    }
    .card {
      min-height: 200px;
      margin-bottom: 15px;
      background-color: #1e293b !important;
      border: 1px solid #334155 !important;
    }
    .card-header-title {
      padding: 10px 15px;
      background: #111827;
      font-size: 14px;
      font-weight: bold;
      color: #94a3b8;
      border-bottom: 1px solid #334155;
    }
    /* 修正 API 小部件在 Bootstrap 容器中的渲染寬高 */
    api-sports-widget {
      display: block;
      width: 100%;
      min-height: 150px;
    }
    .btn-maroon {
      background-color: #8a1538 !important;
      color: white !important;
      font-weight: bold;
    }
    .btn-maroon:hover { opacity: 0.9; }
    .btn-gold {
      background-color: #eebe6c !important;
      color: #111 !important;
      font-weight: bold;
    }
    .btn-gold:hover { opacity: 0.9; }
  </style>
</head>

<body>
  
  <!-- 頂部官方同款導覽列 -->
  <nav class="header navbar navbar-expand-lg bg-body-tertiary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">🏆 FIFA 2026 WORLD CUP LIVE</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" data-sport="football" href="#">足球 (Football)</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="baseball" href="#">棒球 (Baseball)</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="basketball" href="#">籃球 (Basketball)</a></li>
          <li class="nav-item"><a class="nav-link" data-sport="hockey" href="#">冰球 (Hockey)</a></li>
        </ul>
        <!-- 頂部動態積分顯示板 -->
        <span class="navbar-text text-warning font-monospace fs-5 me-3">
          我的模擬積分: <span id="user-points" class="fw-bold text-white">0</span> PTS
        </span>
      </div>
    </div>
  </nav>

  <!-- 三欄連動核心版面 -->
  <div class="content p-3">
    <div class="row">

      <!-- 左側欄：聯賽列表 (寬度 3/12) -->
      <div class="col-md-3">
        <div class="card text-bg-dark border-dark">
          <div class="card-header-title">🌍 聯賽國家分組列表</div>
          <div class="card-body p-0">
            <api-sports-widget data-type="leagues"></api-sports-widget>
          </div>
        </div>
        
        <!-- 卡密儲值模組完美插入左下方 -->
        <div class="card text-bg-dark border-dark p-3">
          <h6 class="text-warning">🔑 卡密點數兌換</h6>
          <div class="input-group input-group-sm mb-2">
            <input type="text" id="card-code" class="form-control bg-dark text-white border-secondary" placeholder="輸入卡密序號">
            <button class="btn btn-gold" onclick="redeemCard()">兌換</button>
          </div>
        </div>
      </div>

      <!-- 中間欄：即時賽程比分列表 (寬度 5/12，為點擊後的渲染目標) -->
      <div class="col-md-5">
        <div class="card text-bg-dark border-dark">
          <div class="card-header-title">📅 今日賽程與實時比分看板</div>
          <div class="card-body p-0">
            <div id="games-list-container">
              <api-sports-widget data-type="games"></api-sports-widget>
            </div>
          </div>
        </div>
      </div>

      <!-- 右側欄：動態分析與即時投注面板 (寬度 4/12) -->
      <div class="col-md-4">

        <!-- 積分投注模組完美插入右上方 -->
        <div class="card text-bg-dark border-dark p-3">
          <h6 class="text-info">🔥 焦點賽事 · 模擬積分競猜</h6>
          <p class="text-muted small mb-2">請點擊中間賽事查看詳情，每注固定消耗 10 積分。</p>
          <div class="d-flex justify-content-between">
            <button class="btn btn-sm btn-maroon w-30" onclick="placePointsBet('主隊勝 (Home)')">主勝</button>
            <button class="btn btn-sm btn-secondary w-30" onclick="placePointsBet('平局 (Draw)')">和局</button>
            <button class="btn btn-sm btn-primary w-30" onclick="placePointsBet('客隊勝 (Away)')">客勝</button>
          </div>
        </div>

        <!-- 官方動態瞄準容器：積分榜 (點擊中間聯賽後，會自動在這邊長出來) -->
        <div class="card text-bg-dark border-dark">
          <div class="card-header-title">📊 即時小組積分榜 (Standings)</div>
          <div class="card-body p-0">
            <div id="standings-content"></div>
          </div>
        </div>
        
        <!-- 官方動態瞄準容器：球隊詳情 -->
        <div class="card text-bg-dark border-dark">
          <div class="card-header-title">🛡️ 球隊戰力分析 (Team Info)</div>
          <div class="card-body p-0">
            <div id="team-content"></div>
          </div>
        </div>

        <!-- 官方單場詳情：默認展示單場，點擊中間賽事會在這自動更新 -->
        <div id="game-content" class="card text-bg-dark border-dark">
          <div class="card-header-title">⚡ 賽事即時統計與動態事件 (Live Stats)</div>
          <div class="card-body p-0">
            <!-- 這裡預設放一個有數據的賽事 ID，防止初始化空白 -->
            <api-sports-widget data-type="game" data-game-id="1037231"></api-sports-widget>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- 全局核心 Config 配置小部件 (放在頁尾不影響視覺) -->
  <api-sports-widget 
    data-type="config" 
    data-sport="football" 
    data-key="a5f67c885e08bb098a1d202408f4fedd" 
    data-lang="zh"
    data-theme="dark" 
    data-show-error="true" 
    data-show-logos="true" 
    data-refresh="15" 
    data-favorite="true"
    data-player-trophies="true" 
    data-standings="true" 
    data-player-injuries="true" 
    data-team-squad="true"
    data-team-statistics="true" 
    data-player-statistics="true" 
    data-tab="games" 
    data-game-tab="statistics"
    data-target-player="modal" 
    data-target-league="#games-list-container" 
    data-target-team="#team-content"
    data-target-game="#game-content .card-body" 
    data-target-standings="#standings-content"
  ></api-sports-widget>

</body>

<!-- 修正後的官方導覽列切換與卡密投注邏輯腳本 -->
<script>
  // 1. 積分初始化
  let currentPoints = parseInt(localStorage.getItem("user_points")) || 0;
  document.getElementById("user-points").innerText = currentPoints;

  // 2. 修正後的官方切換運動項目邏輯 (移除會報錯的 connectedCallback)
  document.addEventListener('click', function (event) {
    if (!event.target.matches('.nav-link')) return;
    event.preventDefault();

    // 切換高亮樣式
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');

    let sport = event.target.getAttribute('data-sport');

    // 重新為所有核心小部件賦值，V3 引擎會自動監聽並安全刷數據
    let widgets = document.querySelectorAll('api-sports-widget');
    widgets.forEach(widget => {
       if(widget.getAttribute('data-type') !== 'config') {
          widget.setAttribute('data-sport', sport);
          widget.innerHTML = ''; // 清空舊內容觸發自適應渲染
       } else {
          widget.setAttribute('data-sport', sport);
       }
    });
  });

  // 3. 卡密儲值邏輯
  async function redeemCard() {
      const codeInput = document.getElementById("card-code");
      const code = codeInput.value.trim();
      if(!code) { alert("請輸入卡密！"); return; }
      
      const gasUrl = "您的_GOOGLE_APPS_SCRIPT_URL"; 
      try {
          const response = await fetch(gasUrl, { method: "POST", body: JSON.stringify({ code: code }) });
          const result = await response.json();
          if(result.success) {
              currentPoints += parseInt(result.points);
              localStorage.setItem("user_points", currentPoints);
              document.getElementById("user-points").innerText = currentPoints;
              alert(result.message);
              codeInput.value = "";
          } else { alert(result.message); }
      } catch(e) { alert("卡密驗證超時，請檢查 Google Apps Script 權限設定！"); }
  }

  // 4. 投注扣點邏輯
  function placePointsBet(prediction) {
      if(currentPoints < 10) {
          alert("積分不足！請先利用左側儲值卡密。");
          return;
      }
      currentPoints -= 10;
      localStorage.setItem("user_points", currentPoints);
      document.getElementById("user-points").innerText = currentPoints;
      alert("【投注成功】您已選擇：" + prediction + "\n請等待完場後管理員在後台執行核對。");
  }
</script>
</html>
